version: "3.7"

services:

  postgres:
    image: postgres:16
    container_name: postgres_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: maindb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

  mongodb:
    image: mongo:latest
    container_name: mongodb_db
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    networks:
      - app-network

  neo4j:
    image: neo4j:5
    container_name: neo4j_db
    environment:
      NEO4J_AUTH: neo4j/password123
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
    networks:
      - app-network

  blog-service:
    build:
      context: ./backend/blog/BlogService
      dockerfile: Dockerfile
    container_name: blog_service
    environment:
      MongoDbSettings__ConnectionString: mongodb://mongodb:27017
      MongoDbSettings__DatabaseName: BlogDb
      ASPNETCORE_URLS: http://+:44307
    ports:
      - "44307:44307"
    depends_on:
      - mongodb
    networks:
      - app-network
  
  follow-service:
    build:
      context: ./backend/follow
      dockerfile: Dockerfile
    container_name: follow_service
    environment:
      PORT: 8083
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: password123
    ports:
      - "8083:8083"
    depends_on:
      - neo4j
    networks:
      - app-network

  tours-service:
    build:
      context: ./backend/tours/ToursService  
      dockerfile: Dockerfile
    container_name: tours_service
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=maindb;Username=admin;Password=admin123
      ASPNETCORE_URLS: http://+:44345
    ports:
      - "44345:44345"
    depends_on:
      - postgres
    networks:
      - app-network

  stakeholders-service:
    build:
      context: ./backend/stakeholders
    container_name: stakeholders_service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/maindb
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=admin123
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend/stakeholders
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - blog-service
      - stakeholders-service
    networks:
      - app-network

volumes:
  pgdata:
  mongodata:
  neo4jdata:

networks:
  app-network:
    driver: bridge