<nav class="navbar">
  <div class="nav-logo">
    <a routerLink="/">Traveller</a>
  </div>

  <div class="nav-links">
    <a routerLink="/">Home</a>

    <ng-container *ngIf="!isLoggedIn">
      <button (click)="goToLogin()" class="btn-nav">Sign In</button>
      <button (click)="goToSignUp()" class="btn-nav btn-primary">Register</button>
    </ng-container>

    <ng-container *ngIf="isLoggedIn">
      <a routerLink="/tours">All Tours</a>

      <a *ngIf="user?.role?.name === 'ROLE_GUIDE'" routerLink="/my-tours" class="author-link">My Tours</a>
      <a routerLink="/profile" class="profile-link">My Profile</a>
      
      <a *ngIf="user?.role?.name === 'ROLE_TOURIST'" routerLink="/shopping-cart" class="cart-link" style="position: relative; display: inline-flex; align-items: center; text-decoration: none; color: #333;">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"></circle>
          <circle cx="20" cy="21" r="1"></circle>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
        <span *ngIf="cartItemCount > 0" style="position: absolute; top: -5px; right: -10px; background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 12px; font-weight: bold;">
          {{ cartItemCount }}
        </span>
      </a>

      <button (click)="logout()" class="btn-logout">Logout</button>
    </ng-container>
  </div>
</nav>
