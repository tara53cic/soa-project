<div *ngIf="!isLoggedIn" class="section">
  <div class="section">
    <div class="overlay">
      <h1>Welcome to the Traveller</h1>
      <p>Your journey begins here. To start exploring amazing tours and destinations, please join our community.</p>
      
      <div class="button-group">
        <button routerLink="/login" class="btn btn-login">Sign In</button>
        <button routerLink="/register" class="btn btn-register">Register</button>
      </div>
    </div>
  </div> 
</div>

<div *ngIf="isLoggedIn" class="dashboard-container">
  <div class="dashboard-header">
    <div class="text-group">
      <h2>Welcome back!</h2>
      <p>You are now logged in. Here you will see your tours and activities soon.</p>
    </div>
    
    <button routerLink="/create-blog" class="btn-create-blog">+ Create New Post</button>
  </div>

  <div class="placeholder-card">
    <p>Tours coming soon...</p>
  </div>

  <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">

  <app-blog-list [limit]="10"></app-blog-list>
</div>
