<div class="my-tours-container">
  <div class="header">
    <h1>My Tours</h1>
    <button class="btn-add" (click)="onCreateTour()">
      <span class="plus-icon">+</span> Create New Tour
    </button>
  </div>

  <div class="tour-grid">
    <div *ngFor="let tour of tours" class="tour-card" (click)="onViewTour(tour)">
    <div class="status-badge" [ngClass]="getStatusClass(tour.status)">
      {{ getStatusLabel(tour.status) }}
    </div>

      <div class="tour-info">
        <h3>{{ tour.name }}</h3>

      <div class="difficulty-wrapper">
        <span class="difficulty-badge" [ngClass]="getDifficultyClass(tour.difficulty)">
          {{ getDifficultyLabel(tour.difficulty) }}
        </span>
      </div>

        <p>Distance: <strong>{{ tour.distanceInKm | number:'1.2-2' }} km</strong></p>
        <p>Price: <strong>{{ tour.price }} €</strong></p>
      </div>
      <div class="card-footer">
        <span>Click to manage points &rarr;</span>
      </div>
    </div>
  </div>

  <div *ngIf="tours.length === 0" class="empty-state">
    <p>You haven't created any tours yet. Click the button above to start!</p>
  </div>
</div>
