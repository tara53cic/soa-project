spring.application.name=stakeholders

spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:5432/${DB_NAME:maindb}
spring.datasource.username=${DB_USER:admin}
spring.datasource.password=${DB_PASS:admin123}

spring.sql.init.platform=postgres

spring.neo4j.uri=bolt://${NEO4J_HOST:neo4j}:7687
spring.neo4j.authentication.username=neo4j
spring.neo4j.authentication.password=password123

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

grpc.server.port=9090

#jaeger
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.observations.http.server.requests.enabled=true
management.endpoints.web.exposure.include=*

otel.exporter.otlp.endpoint=http://jaeger:4318
otel.exporter.otlp.protocol=http/protobuf
otel.service.name=stakeholders